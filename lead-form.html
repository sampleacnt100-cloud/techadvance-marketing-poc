<!DOCTYPE html>
<html>
<head>
    <title>Free Consultation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Request Free Consultation</h1>

    <form action="thankyou.html">

        <input type="text"
               placeholder="Full Name"
               required>

        <br><br>

        <input type="email"
               placeholder="Email Address"
               required>

        <br><br>

        <input type="tel"
               placeholder="Phone Number"
               required>

        <br><br>

        <select required>

            <option value="">
                Select Service
            </option>

            <option>
                Software Development
            </option>

            <option>
                Recruitment Services
            </option>

            <option>
                Cloud Solutions
            </option>

            <option>
                IT Consulting
            </option>

        </select>

        <br><br>

        <button class="btn">
            Submit Request
        </button>

    </form>

</div>

</body>
</html>
